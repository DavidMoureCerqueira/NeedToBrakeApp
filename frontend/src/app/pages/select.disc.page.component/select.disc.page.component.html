<section class="flex flex-col gap-20 justify-evenly flex-1 overflow-hidden">
  <div class="flex flex-col items-center gap-20 md:flex md:flex-row md:justify-evenly">
    <disc-data
      [title]="'Actual Disc'"
      [themeName]="'current'"
      (discEmitter)="receiveExistingDisc($event)"
      [modifiedDisc]="existingDisc()"
    ></disc-data>

    <disc-ilustration [discoIlustrado]="existingDisc()"></disc-ilustration>
  </div>
  <div class="flex flex-col items-center gap-20 md:flex md:flex-row md:justify-evenly">
    <disc-data
      [title]="'Desired Disc'"
      [themeName]="'desired'"
      (discEmitter)="receiveDesiredDisc($event)"
      [modifiedDisc]="desiredDisc()"
    ></disc-data>
    <disc-ilustration [discoIlustrado]="desiredDisc()"></disc-ilustration>
  </div>
  <div class="flex flex-row flex-wrap justify-center items-center">
    <button class="btn btn-secondary self-center" (click)="syncEmptyFields()">Igualar</button>
    <button class="btn btn-primary self-center" (click)="searchDiscs()">Buscar</button>
  </div>
  <section class="overflow-y-scroll">
    <list-disc
      [listDiscPerCar]="listDiscCar()"
      [isError]="isError()"
      [isLoading]="isLoading()"
    ></list-disc>
  </section>
</section>
