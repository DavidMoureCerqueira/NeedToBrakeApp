<form
  [formGroup]="commentForm"
  (ngSubmit)="sendComment()"
  class="bg-base-100 border border-base-200 rounded-xl p-4 shadow-sm mt-4"
>
  <label for="comment" class="block text-sm font-medium text-gray-700 mb-2"> Tu comentario </label>

  <textarea
    id="comment"
    formControlName="text"
    rows="3"
    class="w-full px-3 py-2 text-white border border-base-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all resize-none"
    [class.border-red-500]="commentForm.controls.text.invalid && commentForm.controls.text.touched"
    placeholder="Share your thoughts..."
  >
  </textarea>

  @if (commentForm.controls.text.invalid && commentForm.controls.text.touched) {
    <p class="text-xs text-warning mt-1">Your commentary needs to be atleats 3 characters long</p>
  }

  <div class="flex justify-end gap-2 mt-3">
    <button
      type="button"
      (click)="onCancel.emit()"
      class="px-4 py-2 text-sm font-medium btn btn-secondary transition"
    >
      Cancel
    </button>

    <button
      type="submit"
      [disabled]="commentForm.invalid"
      class="px-4 py-2 text-sm font-medium text-white btn btn-primary disabled:opacity-50 disabled:cursor-not-allowed transition"
    >
      Comment
    </button>
  </div>
</form>
