<div class="container mx-auto p-2 md:p-4">
  <post-detail-component
    [post]="this.post()"
    (showCommentInput)="handleShowCommentinInput()"
    [isCommenting]="isCommenting()"
    [commentCount]="this.commentCount()"
  ></post-detail-component>
  @if (this.isCommenting()) {
    <write-comment-component
      (onCancel)="isCommenting.set(false)"
      (onSubmit)="createComment($event)"
    ></write-comment-component>
  }
  <section class="mt-8 md:mt-12">
    <h3 class="text-xl md:text-2xl font-bold mb-6">Comments</h3>
    <comment-list-component
      [postId]="this.post().id"
      (totalCommentsChanged)="updateCount($event)"
    ></comment-list-component>
  </section>
</div>
