<div class="plano-container">
  <img class="imagen plano" src=" /images/ilustracion.webp" alt="Reference-Image" />
  <table>
    <thead>
      <tr>
        <th>A</th>
        <th>B</th>
        <th>C</th>
        <th>D</th>
        <th>E</th>
        <th>F</th>
        <th>G</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>{{ discoIlustrado().diameter || '-' }}</td>
        <td>{{ discoIlustrado().height || '-' }}</td>
        <td></td>
        <td>{{ discoIlustrado().thickness || '-' }}</td>
        <td>{{ discoIlustrado().pcd || '-' }}</td>
        <td>{{ discoIlustrado().holes || '-' }}</td>
        <td>{{ discoIlustrado().centerBore || '-' }}</td>
      </tr>
    </tbody>
  </table>
</div>
