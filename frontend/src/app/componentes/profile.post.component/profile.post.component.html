<div
  class="flex flex-col border border-zinc-800 rounded-4xl overflow-hidden bg-zinc-950/40 min-h-0 shadow-lg"
>
  <div class="grid items-center border-b border-zinc-800 bg-zinc-900/80">
    <div
      class="col-start-1 row-start-1 py-3 text-center font-black text-xs text-zinc-400 uppercase tracking-[0.3em]"
    >
      Posts
    </div>
    @if (isOwner()) {
      <div class="col-start-1 row-start-1 h-full flex justify-end">
        <a
          class="h-full flex items-center px-6 gap-2 bg-zinc-900/40 hover:bg-zinc-800 transition-all group"
          [routerLink]="['/forum/post/create']"
        >
          <span class="text-zinc-500 group-hover:text-lime-400 font-bold">+</span>
          <span class="text-zinc-500 uppercase group-hover:text-zinc-200"> Add </span>
        </a>
      </div>
    }
  </div>
  <div
    class="flex-1 overflow-y-auto md:max-h-[25vh] min-h-0 scrollbar-thin scrollbar-thumb-zinc-800"
  >
    <table class="w-full border-collapse">
      <tbody class="divide-y divide-zinc-900/50">
        @for (post of userPosts().items; track post.id) {
          <tr class="group hover:bg-zinc-800/40 transition-colors">
            <td class="p-4 pl-6">
              <p
                class="text-base font-bold text-zinc-200 group-hover:text-red-500 transition-colors italic uppercase tracking-tight"
              >
                {{ post.title }}
              </p>
              <p class="text-[11px] text-zinc-500 font-bold uppercase mt-1">
                @if (post.car) {
                  {{ post.car | formatCar }}
                } @else {
                  No car related
                }
              </p>
              <p class="text-[11px] text-zinc-500 font-bold uppercase mt-1">
                {{ post.date | date: 'dd MMM yyyy' }}
              </p>
            </td>
            <td class="p-4 text-right pr-6 text-base text-zinc-500 font-mono">
              💬 {{ post.comment_count }}
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
  <app-pagination-component
    class="py-1"
    [pagination]="{
      currentPage: userPosts().page,
      pages: userPosts().pages,
      hasNext: userPosts().hasNext,
    }"
    (pageChanger)="getItemsByPage($event)"
  ></app-pagination-component>
</div>
