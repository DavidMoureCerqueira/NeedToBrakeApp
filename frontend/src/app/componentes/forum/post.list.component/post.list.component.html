<div class="p-6">
  <div class="flex flex-col gap-4 w-full">
    @for (post of forum().items; track post.id) {
      <div
        [routerLink]="[`post/${post.id}`]"
        class="group flex flex-col bg-base-100 border border-base-300 shadow-sm hover:shadow-md transition-all duration-200 rounded-2xl overflow-hidden"
      >
        <div class="p-6">
          <div class="flex justify-between items-start mb-3">
            <h2 class="text-xl font-bold text-primary hover:underline cursor-pointer">
              {{ post.title }}
            </h2>
            <span class="badge badge-ghost badge-sm text-xs opacity-70">
              v{{ post.versionId }}
            </span>
          </div>

          <p class="text-base-content/80 leading-relaxed mb-4 line-clamp-3">
            {{ post.content }}
          </p>

          <div class="flex items-center justify-between mt-auto pt-4 border-t border-base-200">
            <div class="flex items-center gap-2">
              <div class="avatar placeholder">
                <div class="bg-neutral text-neutral-content rounded-full w-8">
                  <span class="text-xs">{{ post.userId.toString().substring(0, 2) }}</span>
                </div>
              </div>
              <div class="flex flex-col">
                <span class="text-sm font-semibold italic">@user_{{ post.userId }}</span>
                <span class="text-xs opacity-50">{{
                  post.date | date: 'dd MMM, yyyy · HH:mm'
                }}</span>
              </div>
            </div>

            <button class="btn btn-primary btn-sm btn-outline">Read more...</button>
          </div>
        </div>
      </div>
    }
  </div>
</div>
