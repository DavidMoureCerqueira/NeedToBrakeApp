<div class="flex gap-2.5 md:gap-3.5 items-start">
  <div class="avatar placeholder shrink-0 mt-0.5">
    <div
      class="bg-neutral text-neutral-content rounded-full w-8 md:w-10 border border-base-content/10"
    >
      <span class="text-xs md:text-sm font-bold uppercase">
        {{ comment().author.username.charAt(0) }}
      </span>
    </div>
  </div>

  <div class="flex-1">
    <div class="bg-base-200/60 rounded-2xl rounded-bl-none p-3.5 md:p-4 border border-base-300">
      <div class="flex justify-between items-center gap-3 mb-2.5">
        <span class="text-xs md:text-sm font-bold text-base-content">
          @{{ comment().author.username }}
        </span>
        <span class="text-[10px] md:text-xs text-base-content/40 whitespace-nowrap">
          {{ comment().createdAt | date: 'short' }}
        </span>
      </div>

      <p
        class="text-sm md:text-base text-base-content/80 leading-relaxed whitespace-pre-wrap wrap-break-word"
      >
        {{ comment().content }}
      </p>
    </div>
  </div>
</div>
