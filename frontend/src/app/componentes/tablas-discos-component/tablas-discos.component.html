<section class="tables">
  <div class="disco-visual">
    <disco-existente-component
      (discoEnviar)="recibirDiscoExistente($event)"
    ></disco-existente-component>
    <disco-ilustracion [discoIlustrado]="discoExistente()"></disco-ilustracion>
  </div>
  <div class="botones-container">
    <button class="btn btn-secondary self-center" (click)="igualarDatosVacios()">Igualar</button>
    <button class="btn btn-primary self-center" (click)="enviarDiscos()">Buscar</button>
  </div>
  <div class="disco-visual">
    <disco-deseado-component
      (discoDeseadoInputeado)="recibirDiscoDeseado($event)"
      [discoModificado]="discoDeseado()"
    ></disco-deseado-component>
    <disco-ilustracion [discoIlustrado]="discoDeseado()"></disco-ilustracion>
  </div>
</section>
<section>
  <listado-discos [listDiscPerCar]="listDiscCar()"> </listado-discos>
</section>
